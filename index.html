<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Map</title>
    <style>
        :root {
            --bg-color: #121212;
            --sidebar-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #bb86fc;
            --hover-color: #333;
            --border-color: #333;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
        }

        #sidebar-header {
            padding: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
            color: var(--accent-color);
        }

        #map-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            padding: 20px;
            overflow: auto;
        }

        #map-wrapper {
            position: relative;
            display: inline-block;
        }

        #map-wrapper img {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-radius: 8px;
        }

        /* Accordion Styles */
        #accordion-container {
            flex-grow: 1;
        }

        .accordion-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s;
            font-weight: 500;
        }

        .accordion-header:hover {
            background-color: var(--hover-color);
        }

        .accordion-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.15s ease-out;
            overflow: hidden;
            background-color: #252525;
        }

        .accordion-content > div {
            min-height: 0;
        }

        .accordion-item.active > .accordion-content {
            grid-template-rows: 1fr;
        }

        /* Level Items */

        .level-header {
            padding: 12px 20px 12px 40px;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .level-header:hover {
            background-color: #3a3a3a;
        }

        .level-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.15s ease-out;
            overflow: hidden;
            background-color: #2a2a2a;
        }

        .level-content > div {
            min-height: 0;
        }

        .level-item.active > .level-content {
            grid-template-rows: 1fr;
        }

        /* Room Items */

        .arrow {
            transition: transform 0.2s;
            font-size: 0.8rem;
            color: #ccc;
            cursor: pointer;
            padding: 5px 10px;
        }

        .active > .accordion-header .arrow,
        .active > .level-header .arrow {
            transform: rotate(90deg);
        }

    </style>
</head>
<body>

    <aside id="sidebar">
        <div id="sidebar-header">Campus Map</div>
        <div id="accordion-container">
            <!-- Dynamic Content -->
        </div>
    </aside>

    <main id="map-container">
        <div id="map-wrapper">
            <img src="images/map.png" alt="Campus Map" id="campus-map">
            <!-- Markers will be added here -->
        </div>
    </main>

    <script>
        async function loadData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                renderAccordion(data.buildings);
                renderMarkers(data.buildings);
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('accordion-container').innerHTML = 
                    '<div style="padding: 20px; color: #ff6b6b;">Failed to load data. Please ensure data.json exists and is valid.</div>';
            }
        }

        function renderAccordion(buildings) {
            const container = document.getElementById('accordion-container');
            container.innerHTML = '';
            
            buildings.forEach(building => {
                const buildingEl = document.createElement('div');
                buildingEl.className = 'accordion-item';
                buildingEl.dataset.buildingName = building.name;
                
                buildingEl.innerHTML = `
                    <div class="accordion-header" style="cursor: pointer;">
                        <span>${building.name}</span>
                        <span class="arrow">▶</span>
                    </div>
                    <div class="accordion-content">
                    </div>
                `;

                const header = buildingEl.querySelector('.accordion-header');
                const content = buildingEl.querySelector('.accordion-content');

                    header.addEventListener('click', () => {
                        const marker = document.querySelector(`.marker[data-building-name="${building.name}"]`);
                        const isAlreadySelected = marker && marker.classList.contains('selected');

                        // Update marker selection
                        document.querySelectorAll('.marker').forEach(m => m.classList.remove('selected'));
                        
                        if (!isAlreadySelected && marker) {
                            marker.classList.add('selected');
                            marker.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                            buildingEl.classList.add('active');
                        } else {
                            buildingEl.classList.remove('active');
                        }
                    });

                // Add Levels
                if (building.levels) {
                    const levelsWrapper = document.createElement('div');
                    building.levels.forEach(level => {
                        const levelEl = document.createElement('div');
                        levelEl.className = 'level-item';
                        
                        levelEl.innerHTML = `
                            <div class="level-header" style="cursor: pointer;">
                                <span>${level.name}</span>
                                <span class="arrow">▶</span>
                            </div>
                            <div class="level-content">
                            </div>
                        `;

                        const levelHeader = levelEl.querySelector('.level-header');
                        const levelContent = levelEl.querySelector('.level-content');

                        levelHeader.addEventListener('click', (e) => {
                            e.stopPropagation();
                            levelEl.classList.toggle('active');
                        });

                        // Add Rooms
                        if (level.rooms) {
                            const roomsWrapper = document.createElement('div');
                            level.rooms.forEach(room => {
                                const roomEl = document.createElement('div');
                                roomEl.className = 'room-item';
                                roomEl.textContent = room;
                                roomsWrapper.appendChild(roomEl);
                            });
                            levelContent.appendChild(roomsWrapper);
                        }

                        levelsWrapper.appendChild(levelEl);
                    });
                    content.appendChild(levelsWrapper);
                }

                container.appendChild(buildingEl);
            });
        }

        function renderMarkers(buildings) {
            const wrapper = document.getElementById('map-wrapper');
            // Keep the image, but remove old markers
            const markers = wrapper.querySelectorAll('.marker');
            markers.forEach(m => m.remove());

            buildings.forEach(building => {
                if (building.marker) {
                    const markerEl = document.createElement('div');
                    markerEl.className = 'marker';
                    markerEl.dataset.buildingName = building.name;
                    markerEl.style.left = building.marker.x;
                    markerEl.style.top = building.marker.y;
                    markerEl.title = building.name;
                    
                    markerEl.addEventListener('click', (e) => {
                        e.stopPropagation();

                        const isAlreadySelected = markerEl.classList.contains('selected');

                        // Select marker
                        document.querySelectorAll('.marker').forEach(m => m.classList.remove('selected'));
                        
                        if (isAlreadySelected) {
                            // If it was already selected, we just de-selected it.
                            // We can also close the accordion if it was open for this building.
                            const accordionItem = document.querySelector(`.accordion-item[data-building-name="${building.name}"]`);
                            if (accordionItem && accordionItem.classList.contains('active')) {
                                accordionItem.classList.remove('active');
                            }
                        } else {
                            markerEl.classList.add('selected');

                            // Find the corresponding accordion item
                            const accordionItem = document.querySelector(`.accordion-item[data-building-name="${building.name}"]`);
                            if (accordionItem) {
                                if (!accordionItem.classList.contains('active')) {
                                    accordionItem.classList.add('active');
                                }
                                
                                // Scroll to the accordion item
                                accordionItem.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            }
                        }
                    });

                    wrapper.appendChild(markerEl);
                }
            });
        }

        function initMapClickListener() {
            const mapImg = document.getElementById('campus-map');
            
            mapImg.addEventListener('click', (e) => {
                const rect = mapImg.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                
                const xFormatted = Math.round(x) + '%';
                const yFormatted = Math.round(y) + '%';
                
                console.log(`"marker": { "x": "${xFormatted}", "y": "${yFormatted}" },`);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            initMapClickListener();
        });
    </script>
</body>
</html>
